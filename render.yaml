# Render.com Blueprint for VegeLink.
# Deploy: push this folder to GitHub, then on Render choose
# "New +" -> "Blueprint" and point it at the repo.
services:
  - type: web
    name: vegelink
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /api/health
    autoDeploy: true
    # Persistent disk so data survives deploys/restarts (instead of re-seeding
    # clean each boot). DB_PATH points the SQLite file at the mounted disk.
    disk:
      name: vegelink-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DB_PATH
        value: /var/data/vegelink.db
      # --- Optional live integrations (left unset = SIMULATED, fully offline) ---
      # - key: SMS_PROVIDER       # africastalking
      # - key: AT_USERNAME
      # - key: AT_API_KEY
      # - key: PAYMENT_PROVIDER   # paystack / hubtel / momo
      # - key: PAYMENT_API_KEY
