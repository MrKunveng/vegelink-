# Render.com Blueprint for VegeLink.
# Deploy: push this folder to GitHub, then on Render choose
# "New +" -> "Blueprint" and point it at the repo.
services:
  - type: web
    name: vegelink
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /api/health
    autoDeploy: true
    # NOTE: the free plan has ephemeral storage, so the app re-seeds clean demo
    # data on each deploy/restart (server.main seeds when the DB is missing) —
    # perfect for a demo. For PERSISTENT data, upgrade to a paid plan and add a
    # disk + DB_PATH (free-plan web services cannot mount a disk):
    #   plan: starter
    #   disk:
    #     name: vegelink-data
    #     mountPath: /var/data
    #     sizeGB: 1
    #   envVars: [ { key: DB_PATH, value: /var/data/vegelink.db } ]
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      # --- Optional live integrations (left unset = SIMULATED, fully offline) ---
      # - key: SMS_PROVIDER       # africastalking
      # - key: AT_USERNAME
      # - key: AT_API_KEY
      # - key: PAYMENT_PROVIDER   # paystack / hubtel / momo
      # - key: PAYMENT_API_KEY
